name: Semgrep RFC Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  semgrep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Rodar Semgrep
        run: |
          echo "Running Semgrep against repository"
          semgrep --error --config=rules/ .