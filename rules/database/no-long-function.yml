rules:
  - id: CS-003-controller-logic
    message: " Controller não deve conter lógica de negócio"
    severity: ERROR
    languages: [typescript]

    patterns:
      - pattern: |
          if ($COND) {
            ...
          }
      - pattern-not: |
          if (!$REQ.body) {
            ...
          }

    paths:
      include:
        - "**/controllers/**"