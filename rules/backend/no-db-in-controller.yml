rules:
  - id: no-db-in-controller
    message: |
      Controller não pode acessar o banco diretamente.
      Motivo: o controller deve orquestrar a requisição, não executar acesso a dados.
      Como corrigir: mova o acesso ao banco para Service ou Repository.
    severity: ERROR
    languages: [typescript]

    patterns:
      - pattern-either:
          - pattern: $DB.query(...)
          - pattern: $DB.find(...)
          - pattern: $DB.insert(...)
          - pattern: $DB.update(...)
          - pattern: $DB.delete(...)
          - pattern: prisma.$METHOD(...)
          - pattern: connection.$METHOD(...)

    paths:
      include:
        - "**/controllers/**"