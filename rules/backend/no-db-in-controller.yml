rules:
  - id: no-db-in-controller
    message: "Controller cannot access the database"
    severity: ERROR
    languages: [typescript]
    pattern-either:
      - pattern: $DB.query(...)
      - pattern: $DB.find(...)
      - pattern: $DB.insert(...)
      - pattern: $DB.update(...)
      - pattern: $DB.delete(...)
      - pattern: prisma.$METHOD(...)
      - pattern: connection.$METHOD(...)
    paths:
      include:
        - "src/controllers/**/*.ts"