rules:
  - id: CS-082-no-console
    message: "Avoid console logging"
    severity: ERROR
    languages: [typescript]
    pattern-either:
      - pattern: console.log(...)
      - pattern: console.error(...)
      - pattern: console.warn(...)
      - pattern: console.info(...)
    paths:
      include:
        - "src/**/*.ts"