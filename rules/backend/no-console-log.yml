rules:
  - id: CS-082-no-console
    message: |
      Evite console.log/error/warn em código de produção.
      Motivo: logs de console poluem a saída e podem expor informação sensível.
      Como corrigir: remova o console ou use o logger oficial da aplicação.
    severity: ERROR
    languages: [typescript]
    pattern-either:
      - pattern: console.log(...)
      - pattern: console.error(...)
      - pattern: console.warn(...)
      - pattern: console.info(...)