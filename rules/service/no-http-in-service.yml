rules:
  - id: no-http-in-service
    message: "Service nao deve usar HTTP response"
    severity: ERROR
    languages: [typescript]

    patterns:
      - pattern-either:
          - pattern: $X.json(...)
          - pattern: $X.send(...)
      - pattern-not: axios.$METHOD(...)
      - pattern-not: fetch(...)

    paths:
      include:
        - "**/services/**"