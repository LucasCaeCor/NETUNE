rules:
  - id: CS-ARCH-no-http-in-service
    message: |
      Service não pode usar helpers de resposta HTTP.
      Motivo: a camada de service deve cuidar da regra de negócio, não da resposta web.
      Como corrigir: retorne os dados no service e use res.json/res.send no controller.
    severity: ERROR
    languages: [typescript]
    pattern-either:
      - pattern: $RES.json(...)
      - pattern: $RES.send(...)
      - pattern: $RES.status(...)
      - pattern: $RES.status(...).json(...)
      - pattern: $RES.status(...).send(...)
    paths:
      include:
        - "src/services/**"