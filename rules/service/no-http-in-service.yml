rules:
  - id: CS-ARCH-no-http-in-service
    message: "Service cannot use response helpers"
    severity: ERROR
    languages: [typescript]
    pattern-either:
      - pattern: $RES.json(...)
      - pattern: $RES.send(...)
      - pattern: $RES.status(...)
      - pattern: $RES.status(...).json(...)
      - pattern: $RES.status(...).send(...)
    paths:
      include:
        - "src/services/**/*.ts"